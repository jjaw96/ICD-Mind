<!DOCTYPE html>
<html lang="en">
    
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>ICD Mind</title>
</head>
<body>
    <div style="max-width: 600px; margin: 40px auto; padding: 20px; font-family: 'Open Sans', sans-serif;">
        <h1 style="text-align: center;">ICD Mind</h1>
        
        <div style="margin-bottom: 20px;">
            <textarea id="clinicalNote" rows="4" style="width: 100%; padding: 10px; font-size: 16px;" placeholder="Type clinical symptoms or notes here..."></textarea>
            <button id="searchBtn" style="width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; cursor: pointer; background-color: #4f46e5; color: white; border: none; border-radius: 4px;">
                Analyze Symptoms
            </button>
        </div>

        <div id="statusMessage" style="color: #666; font-style: italic; margin-bottom: 10px;"></div>
        <div id="resultsContainer"></div>
    </div>

    <script src="dist/bundle.js" type="module"></script>
</body>
</html>
