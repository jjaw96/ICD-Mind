<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICD Mind</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght=0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>ICD Mind</h1>
            <p>AI-assisted clinical note analysis and ICD search</p>
        </header>
        
        <div class="form-group">
            <textarea id="clinicalNote" placeholder="Type clinical symptoms or notes here..."></textarea>
            <button id="searchBtn">
                Analyze Symptoms
            </button>
        </div>

        <div id="statusMessage"></div>
        <div id="resultsContainer"></div>
    </div>

    <footer>
        <strong>Disclaimer:</strong> ICD Mind is an AI-assisted search tool designed for educational and administrative support. It is not a clinical diagnostic tool or a substitute for professional medical advice.
    </footer>

    <script src="dist/bundle.js" type="module"></script>
</body>
</html>
